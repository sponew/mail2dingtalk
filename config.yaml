# mail2dingtalk 配置文件

smtp:
  # SMTP 服务器监听端口 (需要 root 权限才能使用 25 端口)
  port: 2525
  # SMTP 服务器域名
  domain: "localhost"

dingtalk:
  # 钉钉机器人 Webhook URL (必填)
  # 获取方式：钉钉群 → 群设置 → 智能群助手 → 添加机器人 → 自定义
  webhook_url: "https://oapi.dingtalk.com/robot/send?access_token="
  # 钉钉机器人加签密钥 (可选，推荐使用)
  # 获取方式：创建机器人时选择"加签密钥"，复制密钥到此
secret: ""

storage:
  # 邮件数据存储目录
  email_dir: "data/emails"
  # 附件存储目录
  attachment_dir: "tmp/attachments"
  # 邮件保留天数 (0 表示永久保存)
  retention_days: 180

server:
  # 最大并发处理数 (同时处理的邮件数量)
  max_concurrent: 10

attachment:
  # 附件大小限制 (MB)，超过此大小的附件会保存但不发送
  max_size_mb: 20

log:
  # 日志级别：debug, info, warn, error
  level: "info"
  # 日志文件路径
  file: "logs/app.log"
